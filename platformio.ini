; 编译加速：跨次构建复用未改动的 .o（改 platformio.ini / build_flags / 增删源文件仍会触发重编）
[platformio]
build_cache_dir = .pio/build-cache

; 固件语言：C/C++（Arduino 框架）。PlatformIO 用 Python 实现，实际编译器为 Xtensa GCC。
; CLI：pio run / platformio run；未加入 PATH 时：python -m platformio run
;
; --- HTTP ---
; 配网页使用 Arduino 自带同步 WebServer。MQTT 使用 PubSubClient + WiFiClient，与 WiFi.loop 同核轮询（避免 AsyncTCP 跨核与 lwIP 不协调导致永久挂起）。
;
; --- 配网 ---
; WiFi AP 就绪后通常为 http://192.168.4.1（端口见 gateway::web_server::kHttpListenPort，默认 80）。
[env:esp32-s3-gateway]
board_build.partitions = partitions_ota_8mb.csv
board_upload.flash_size = 8MB
board_build.flash_mode = qio
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

; monitor_port = COM5
; upload_port = COM5

lib_deps =
  bblanchon/ArduinoJson
  knolleary/PubSubClient

build_unflags =
  -std=gnu++11
build_flags =
  -std=gnu++17
  -Wall
  ; 与 espressif 板默认一致：UART `Serial` + 独立 `USBSerial`（原生 D+/D-），便于 CAN 镜像只写 USBSerial
  -DARDUINO_USB_CDC_ON_BOOT=0
  ; 启用 TaskStatus_t 中的 xCoreID 字段
  -DCONFIG_FREERTOS_VTASKLIST_INCLUDE_COREID
	  -DCONFIG_FREERTOS_USE_TRACE_FACILITY=1
  -DFW_PROJECT_NAME=\"ps-pro-gateway\"
  -DFW_VERSION=\"1.0.0\"
  -DFW_BUILD=2026061803
  -DFW_HW=\"1.1\"
  -DFW_CHANNEL=\"stable\"
  -DOTA_PRIMARY_SCHEME=\"http\"
  -DOTA_PRIMARY_HOST=\"do-update.top\"
  -DOTA_PRIMARY_PORT=50080
  -DOTA_PRIMARY_USE_TLS=0
  -DOTA_PRIMARY_HTTPS_PORT=50443
  -DOTA_LAN_SCHEME=\"http\"
  -DOTA_LAN_HOST=\"192.168.1.101\"
  -DOTA_LAN_PORT=50080
