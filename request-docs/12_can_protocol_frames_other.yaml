# ────────────────────────────────────────────────────────
# 此文件从 12_can_protocol_frames.yaml 拆分而来
# 包含 PGN 范围: other PGNs (0x01xx, 0xFxxx)
#
# 完整协议由以下文件共同组成:
#   - 12_can_protocol_frames_15xx.yaml  (0x15xx)
#   - 12_can_protocol_frames_17xx.yaml  (0x17xx)
#   - 12_can_protocol_frames_18xx.yaml  (0x18xx)
#   - 12_can_protocol_frames_other.yaml  (other PGNs (0x01xx, 0xFxxx)) ← 当前文件
#
# 解析时应将所有文件合并或分别加载。
# 公共 metadata 定义与 12_can_protocol_frames.yaml（原文件）一致。
# ────────────────────────────────────────────────────────

# TCU CAN protocol, indexed by PGN. Byte numbering uses data0..data7; bit_start=0 means LSB.
metadata:
  schema_version: 12_can_protocol_frames
  description: >
    TCU CAN 通讯协议帧定义文件。以 PGN（Parameter Group Number）为索引，
    描述每个 CAN 帧内各 element 的字节/位布局、物理量纲和枚举引用。
    解析程序应配合 10_can_protocol_intro.yaml 的解析流程，并联动
    11_can_protocol_enums.yaml 完成枚举值翻译。

  # ── CAN ID 格式 ──────────────────────────────────────
  can_id_format:
    type: "29-bit extended CAN ID (SAE J1939 兼容)"
    display: "8 位十六进制字符串，如 0x06151E03"
    fields:
      priority_byte:
        bits: "ID[28:24]"
        description: >
          最高字节，包含 J1939 优先级 Priority(3 bits) + 保留位 R(1 bit) +
          数据页 DP(1 bit)。在 32-bit 表示中为 (can_id >> 24) & 0xFF。
        example: "0x06"
      pgn:
        bits: "ID[23:8]"
        description: >
          参数组编号 PGN，由 PF（PDU Format, ID[23:16]）和 PS（PDU Specific,
          ID[15:8]）组成。PF < 240 时 PS 为目标地址 DA；PF >= 240 时 PS 为
          组扩展 GE。提取公式: pgn = (can_id >> 8) & 0xFFFF。
        example: "0x151E"
      source_address:
        bits: "ID[7:0]"
        description: >
          J1939 源地址 SA，在本协议中用于区分通信方向。
          TCU → 上位机/网关: 0x03
          上位机/网关 → TCU: 0x60
        example: "0x03 (TCU 发出)"

  # ── 帧键索引规则 ──────────────────────────────────────
  index_rule:
    method: "帧键 = PGN 的 4 位十六进制字符串"
    format: "0xGGGG"
    description: >
      帧键仅使用 PGN，不包含优先级字节和源地址。
      完整 CAN ID 0x06151E03 在本文件中的帧键为 0x151E。
      priority 和 source_address 信息分别存储在帧对象的 priority 字段和
      CAN ID 的 SA 字段中，不参与帧键匹配。
    derivation: |
      pgn = (can_id >> 8) & 0xFFFF
      frame_key = f"0x{pgn:04X}"

  # ── 优先级规则 ───────────────────────────────────────
  priority_rule:
    description: >
      每个帧的 priority 字段来自两路来源：Word 协议文档和软件 JSON 配置。
      当同一 PGN 在两路来源中均存在且 priority 不一致时，以 Word 文档的
      priority 为准。source_authority 字段记录了当前帧定义的来源。
    sources:
      word: "Word 协议文档，优先级较高"
      software_json: "软件 JSON 配置"

  # ── CAN 通道分配规则 ─────────────────────────────────
  channel_rule:
    description: >
      根据 PGN 范围自动确定 CAN 物理通道。
      PGN 在 0x1700 ~ 0x18FF 范围内的帧走 CAN1，
      其余 PGN 的帧走 CAN0。
      每个帧对象内的 channel 字段必须与此规则一致。
    mapping:
      - pgn_range: "0x1700 ~ 0x18FF"
        channel: CAN1
      - pgn_range: "其余"
        channel: CAN0
    parser_requirement: >
      解析程序应将实际接收通道与 frame.channel 比对，
      不一致时记录 channel_mismatch 诊断信息。

  # ── Payload 字节/位编号 ──────────────────────────────
  byte_numbering:
    description: "CAN 数据字节编号为 data0 ~ data7，共 8 字节"
    byte_start: "0 表示 data0，7 表示 data7"
    note: "Word 文档中的 Byte 1 对应 byte_start=0，切勿直接使用 Word 编号"

  bit_numbering:
    description: "每个字节内部 bit_start 从 0（LSB 最低位）到 7（MSB 最高位）"
    rule: "bit_start=0 表示该字节的最低位"
    note: "Word 文档中的 bit 1 为 MSB，切勿直接使用 Word 编号"

  multi_byte_order:
    default: little_endian
    description: >
      对于 byte_length > 1 的连续多字节 element，默认按 little-endian 组合。
      低地址字节为数值的低 8 位。
      例如 byte_start=2, byte_length=2 → raw = data2 | (data3 << 8)。
      若 element 显式声明 byte_order 字段，应优先使用其值覆盖本默认值。

  # ── 枚举引用规则 ─────────────────────────────────────
  enum_id_rule:
    description: >
      element.enum_id 引用 11_can_protocol_enums.yaml 中的 enums[].enum_id。
      enum_id = 0 表示该 element 无枚举引用，仅输出 raw 和 physical_value。
      enum_id ≠ 0 时必须查找对应的枚举定义，生成 enum_text 并同时保留 raw。

  # ── 协议范围 ─────────────────────────────────────────
  scope:
    frame_count: 200
    pgn_range: "0x0100 ~ 0xFEFF"
    channel_distribution:
      CAN0: 103
      CAN1: 97
    bitrate: "250 kbps (SAE J1939 通用速率)"
frames:
  '0x0100':
    priority: '0x03'
    source_authority: word
    channel: CAN0
    interval: 50
    elements:
    - name: 行驶环境描述
      position_raw: Byte 1 bit 8~7
      byte_start: 0
      byte_length: 1
      bit_start: 6
      bit_length: 2
      data_range: 00 ~ 11
      ref_range: 00 ~ 11
      scaling: null
      offset: 0
      unit: ''
      remark: 00=自由环境, 01=田间, 10=道路, 11=未定义
      min: 0
      max: 3
      enum_id: 20
      r/w: w
    - name: 断开动力请求
      position_raw: Byte 1 bit 6~5
      byte_start: 0
      byte_length: 1
      bit_start: 4
      bit_length: 2
      data_range: 00 ~ 11
      ref_range: 00 ~ 11
      scaling: null
      offset: 0
      unit: ''
      remark: 00=允许动力系统工作，01=关闭动力传动系统，10=未定义，11=无动作
      min: 0
      max: 3
      position_note: byte filled from previous Byte position in Word table
      enum_id: 21
      r/w: w
    - name: 未定义
      position_raw: Byte 1 bit 4~3
      byte_start: 0
      byte_length: 1
      bit_start: 2
      bit_length: 2
      data_range: 00 ~ 11
      ref_range: 00 ~ 11
      scaling: null
      offset: 0
      unit: ''
      remark: --
      min: 0
      max: 3
      position_note: byte filled from previous Byte position in Word table
      enum_id: 0
      r/w: ''
    - name: 变速箱控制请求
      position_raw: Byte 1 bit 2~1
      byte_start: 0
      byte_length: 1
      bit_start: 0
      bit_length: 2
      data_range: 00 ~ 11
      ref_range: 00 ~ 11
      scaling: null
      offset: 0
      unit: ''
      remark: 00=允许变速箱换挡，01=禁止变速箱换挡，10=变速箱由外部控制接管，11=无动作
      min: 0
      max: 3
      position_note: byte filled from previous Byte position in Word table
      enum_id: 22
      r/w: w
    - name: 离合器打滑请求
      position_raw: Byte 2
      byte_start: 1
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: 0到100%
      ref_range: 0到100%
      scaling: 0.4
      offset: 0
      unit: '%'
      remark: 0.4%/bit
      min: 0
      max: 100
      enum_id: 0
      r/w: w
      precision: 1
    - name: 换挡请求
      position_raw: Byte 3
      byte_start: 2
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: -125到125
      ref_range: -125到125
      scaling: 1
      offset: -125
      unit: g
      remark: 1gear/bit，FB=STOP
      min: -125
      max: 125
      enum_id: 42
      r/w: w
    - name: 关闭差速锁请求
      position_raw: Byte 4
      byte_start: 3
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: --
      ref_range: --
      scaling: null
      offset: null
      unit: ''
      remark: --
      enum_id: 23
      r/w: w
    - name: 未定义
      position_raw: Byte 5~8
      byte_start: 4
      byte_length: 4
      bit_start: 0
      bit_length: 32
      data_range: --
      ref_range: --
      scaling: null
      offset: null
      unit: ''
      remark: --
      enum_id: 0
      r/w: ''
  '0xF002':
    priority: '0x0C'
    source_authority: word
    channel: CAN0
    interval: 10
    elements:
    - name: ERC1状态
      position_raw: Byte 1
      byte_start: 0
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: --
      ref_range: --
      scaling: null
      offset: null
      unit: ''
      remark: --
      enum_id: 0
      r/w: ''
    - name: 输出轴速度
      position_raw: Byte 2~3
      byte_start: 1
      byte_length: 2
      bit_start: 0
      bit_length: 16
      data_range: 0到8031rpm
      ref_range: 0到8031rpm
      scaling: 0.125
      offset: 0
      unit: rpm
      remark: 0.125rpm/bit
      min: 0
      max: 8031
      enum_id: 0
      r/w: ''
    - name: 离合器打滑率
      position_raw: Byte 4
      byte_start: 3
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: 0到100%
      ref_range: 0到100%
      scaling: 0.4
      offset: 0
      unit: '%'
      remark: 0.4%/bit
      min: 0
      max: 100
      enum_id: 0
      r/w: ''
    - name: ERC1命令
      position_raw: Byte 5
      byte_start: 4
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: ''
      ref_range: ''
      scaling: null
      offset: null
      unit: ''
      remark: ''
      enum_id: 0
      r/w: ''
    - name: 输入轴速度
      position_raw: Byte 6~7
      byte_start: 5
      byte_length: 2
      bit_start: 0
      bit_length: 16
      data_range: 0到8031rpm
      ref_range: 0到8031rpm
      scaling: 0.125
      offset: 0
      unit: rpm
      remark: 0.125rpm/bit
      min: 0
      max: 8031
      enum_id: 0
      r/w: ''
    - name: TCU源地址
      position_raw: Byte 8
      byte_start: 7
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: 0到253
      ref_range: 0到253
      scaling: null
      offset: 0
      unit: ''
      remark: 1源地址/bit，0x03
      min: 0
      max: 253
      enum_id: 0
      r/w: ''
  '0xF003':
    priority: '0x0C'
    source_authority: software_json
    channel: CAN0
    interval: null
    elements:
    - name: 油门踏板位置1
      position_raw: Byte 2
      byte_start: 1
      byte_length: 1
      bit_start: 0
      bit_length: 8
      enum_id: 0
      data_range: 0~100
      ref_range: 0~100
      scaling: 0.4
      offset: 0
      unit: '%'
      remark: TODO
      min: 0
      max: 100
      precision: 1
      r/w: r
    - name: 发动机负荷百分比
      position_raw: Byte 3
      byte_start: 2
      byte_length: 1
      bit_start: 0
      bit_length: 8
      enum_id: 0
      data_range: 0~250
      ref_range: 0~250
      scaling: 1
      offset: 0
      unit: '%'
      remark: TODO
      min: 0
      max: 250
      r/w: r
  '0xF004':
    priority: '0x0C'
    source_authority: software_json
    channel: CAN0
    interval: null
    elements:
    - name: 发动机扭矩模式
      position_raw: Byte 1 bit 4~1
      byte_start: 0
      byte_length: 1
      bit_start: 0
      bit_length: 4
      enum_id: 29
      data_range: 0~15
      ref_range: 0~15
      scaling: 1
      offset: 0
      unit: ''
      remark: TODO
      min: 0
      max: 15
      r/w: r
    - name: 驾驶员意图扭矩百分比
      position_raw: Byte 2
      byte_start: 1
      byte_length: 1
      bit_start: 0
      bit_length: 8
      enum_id: 0
      data_range: -125~125
      ref_range: -125~125
      scaling: 1
      offset: -125
      unit: '%'
      remark: TODO
      min: -125
      max: 125
      r/w: r
    - name: 实际扭矩百分比
      position_raw: Byte 3
      byte_start: 2
      byte_length: 1
      bit_start: 0
      bit_length: 8
      enum_id: 0
      data_range: -125~125
      ref_range: -125~125
      scaling: 1
      offset: -125
      unit: '%'
      remark: TODO
      min: -125
      max: 125
      r/w: r
    - name: 发动机转速
      position_raw: Byte 4~5
      byte_start: 3
      byte_length: 2
      bit_start: 0
      bit_length: 16
      enum_id: 0
      data_range: 0~8031.875
      ref_range: 0~8031.875
      scaling: 0.125
      offset: 0
      unit: rpm
      remark: TODO
      min: 0
      max: 8031.875
      precision: 3
      r/w: r
  '0xF005':
    priority: '0x18'
    source_authority: word
    channel: CAN0
    interval: 100
    elements:
    - name: 未定义
      position_raw: Byte 1
      byte_start: 0
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: --
      ref_range: --
      scaling: null
      offset: null
      unit: ''
      remark: --
      enum_id: 0
      r/w: ''
    - name: 传动比
      position_raw: Byte 2~3
      byte_start: 1
      byte_length: 2
      bit_start: 0
      bit_length: 16
      data_range: 0到64.255
      ref_range: 0到64.255
      scaling: 0.001
      offset: 0
      unit: ''
      remark: 0.001/bit
      min: 0
      max: 64.255
      enum_id: 0
      r/w: r
      precision: 3
    - name: 未定义
      position_raw: Byte 4
      byte_start: 3
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: --
      ref_range: --
      scaling: null
      offset: null
      unit: ''
      remark: --
      enum_id: 0
      r/w: ''
    - name: 请求的挡位
      position_raw: Byte 5
      byte_start: 4
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: 0x00-0xFF
      ref_range: 0x00-0xFF
      scaling: null
      offset: 0
      unit: ''
      remark: 偏置-125后，-125~-65=停车挡，-64~-1=倒挡，0=空挡，1~32=低挡，33~64=高挡
      enum_id: 171335
      r/w: w
      min: -125
      max: 125
    - name: 请求的挡位
      position_raw: Byte 6
      byte_start: 5
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: ''
      ref_range: ''
      scaling: null
      offset: null
      unit: ''
      remark: 暂时不用
      enum_id: 42
      r/w: ''
    - name: 当前的挡位
      position_raw: Byte 7
      byte_start: 6
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: 0x00-0xFF
      ref_range: 0x00-0xFF
      scaling: null
      offset: 0
      unit: ''
      remark: 偏置125后，-125~-65=停车挡，-64~-1=倒挡，0=空挡，1~32=低挡，33~64=高挡
      enum_id: 171335
      r/w: r
