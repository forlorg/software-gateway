  '0x1512':
    priority: '0x06'
    source_authority: word
    channel: CAN0
    interval: 400
    elements:
    - name: 请求踏板空行程比率
      position_raw: Byte 1
      byte_start: 0
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: 0 ~ 25%
      ref_range: 0 ~ 25%
      scaling: 0.1
      offset: 0
      unit: '%'
      remark: 0.1%/bit
      min: 0
      max: 25
      enum_id: 0
      r/w: ''
    - name: 实际踏板空行程比率
      position_raw: Byte 2
      byte_start: 1
      byte_length: 1
      bit_start: 0
      bit_length: 8
      data_range: 0 ~ 25%
      ref_range: 0 ~ 25%
      scaling: 0.1
      offset: 0
      unit: '%'
      remark: 0.1%/bit
      min: 0
      max: 25
      enum_id: 0
      r/w: ''
    - name: 请求踏板死区比率
      position_raw: Byte 3
      byte_start: 2
      byte_length: 1
      bit_start: 0
      bit_length: 8
