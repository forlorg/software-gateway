    - name: 踏板原始电压
      position_raw: Byte 5~6
      byte_start: 4
      byte_length: 2
      bit_start: 0
      bit_length: 16
      data_range: 0 ~ 5000mV
      ref_range: 0 ~ 5000mV
      scaling: 1
      offset: 0
      unit: mV
      remark: 1mV/bit
      min: 0
      max: 5000
      enum_id: 0
      r/w: ''
    - name: 踏板实际角度
      position_raw: Byte 7~8
      byte_start: 6
      byte_length: 2
      bit_start: 0
      bit_length: 16
      data_range: -50 到 50°
      ref_range: -50 到 50°
      scaling: 0.002
      offset: -50
      unit: °
      remark: 0.002°/bit
      min: -50
      max: 50
      enum_id: 0
      r/w: rw
      precision: 3
