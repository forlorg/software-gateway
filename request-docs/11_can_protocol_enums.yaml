- enum_id: 170150
  name: 系统状态机
  kind: single
  values:
    '0': 初始化
    '1': 锁定
    '2': 运行
    '3': 调试
    '4': 故障
    '5': 自检
    '6': 阀测试
  source_data_range: 0000 ~ 1111
  source_remark: 0000=初始化，0001=锁定，0010=运行，0011=调试，0100=故障，0101=自检，0110=阀测试
- enum_id: 171335
  name: 请求的挡位
  kind: single
  values:
    '65': 停车挡，-64~-1=倒挡
    '0': 空挡，1~32=低挡，33~64=高挡
  source_data_range: 0x00-0xFF
  source_remark: 偏置-125后，-125~-65=停车挡，-64~-1=倒挡，0=空挡，1~32=低挡，33~64=高挡
- enum_id: 228555
  name: 闪存擦除
  kind: single
  values:
    '0': 无请求
    '1': 请求闪存擦除（解锁后）
  source_data_range: 00 ~ 11
  source_remark: 00=无请求，01=请求闪存擦除（解锁后）
- enum_id: 278923
